research_task:
  description: >
    Conduct a thorough research about {topic}
    Make sure you find any interesting and relevant information given
    the current year is {current_year}.
  expected_output: >
    A list with 10 bullet points of the most relevant information about {topic}
  agent: researcher

reporting_task:
  description: >
    Review the context you got and expand each topic into a full section for a report.
    Make sure the report is detailed and contains any and all relevant information.
  expected_output: >
    A fully fledged report with the main topics, each with a full section of information.
    Formatted as markdown without '```'
  agent: reporting_analyst

editing_task:
  description: >
    Review the report generated by the reporting analyst. 
    1. Fix any grammatical errors and improve the flow.
    2. Add premium, engaging headings and bullet points.
    3. Ensure the tone is premium and addresses the topic ({topic}) perfectly.
    4. Provide SEO meta descriptions and tags at the very bottom.
  expected_output: >
    A fully polished, publication-ready blog post formatted in Markdown, complete with engaging sections and SEO metadata at the bottom.
  agent: editor
  context:
    - reporting_task
